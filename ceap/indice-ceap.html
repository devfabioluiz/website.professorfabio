  <style>
    #year-select {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 70vh;
      padding: 20px;
    }

    #year-select h3 {
      font-size: 1.6rem;
      color: #273c75;
      margin-bottom: 40px;
      text-align: center;
    }

    .year-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 25px;
      max-width: 800px;
    }

    .year-card {
      background: #fff;
      border: 2px solid #2e7d32;
      border-radius: 12px;
      padding: 35px 40px;
      width: 200px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
    }

    .year-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 25px rgba(46, 125, 50, 0.2);
      background-color: #e8f5e9;
    }

    .year-card .year-icon {
      font-size: 3.2rem;
      margin-bottom: 12px;
      color: #2e7d32;
      font-weight: bold;
    }

    .year-card .year-name {
      font-size: 1.2rem;
      font-weight: bold;
      color: #1b5e20;
      margin-bottom: 6px;
    }

    .year-card .year-subjects {
      font-size: 0.85rem;
      color: #666;
    }

    #lesson-view {
      display: none;
      max-width: 750px;
      margin: 30px auto;
      padding: 20px;
    }

    #lesson-view .back-btn {
      display: inline-block;
      background: #273c75;
      color: #fff;
      border: none;
      padding: 10px 24px;
      font-size: 1rem;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 25px;
      transition: background-color 0.2s ease;
    }

    #lesson-view .back-btn:hover {
      background-color: #1b5e20;
    }

    #lesson-view .mod-title {
      color: #273c75;
      border-bottom: 2px solid #2e7d32;
      padding-bottom: 12px;
      margin-bottom: 25px;
      font-size: 1.8rem;
      text-align: center;
    }

    #lesson-view .subject-title {
      color: #2e7d32;
      font-size: 1.4rem;
      margin: 30px 0 15px 0;
      border-bottom: 2px solid #2e7d32;
      padding-bottom: 8px;
    }

    #lesson-view .section-title {
      color: #005bb5;
      font-size: 1.15rem;
      margin: 18px 0 8px 0;
    }

    #lesson-view .subsection-title {
      color: #555;
      font-size: 1rem;
      margin: 14px 0 6px 0;
      font-style: italic;
    }

    #lesson-view ul {
      list-style: none;
      padding: 0;
    }

    #lesson-view ul li {
      margin: 4px 0;
    }

    #lesson-view ul li a {
      text-decoration: none;
      color: #0073e6;
      font-size: 1rem;
      padding: 6px 12px;
      display: block;
      border-radius: 6px;
      transition: background-color 0.2s ease;
    }

    #lesson-view ul li a:hover {
      background-color: #e0f0ff;
    }

    @media only screen and (max-width: 700px) {
      .year-card {
        width: 150px;
        padding: 25px 20px;
      }

      #lesson-view {
        padding: 10px;
      }
    }
  </style>
</head>

    function countLessons(year) {
      var total = 0;
      for (var s = 0; s < year.subjects.length; s++) {
        var subject = year.subjects[s];
        for (var sec = 0; sec < subject.sections.length; sec++) {
          total += subject.sections[sec].items.length;
        }
      }
      return total;
    }

    function showYears() {
      document.getElementById("year-select").style.display = "flex";
      document.getElementById("lesson-view").style.display = "none";
    }

    function showYear(index) {
      var year = years[index];
      document.getElementById("year-select").style.display = "none";
      document.getElementById("lesson-view").style.display = "block";

      document.getElementById("mod-title").textContent = year.name;

      var html = "";

      for (var s = 0; s < year.subjects.length; s++) {
        var subject = year.subjects[s];
        html += '<h3 class="subject-title">' + subject.name + '</h3>';

        for (var sec = 0; sec < subject.sections.length; sec++) {
          var section = subject.sections[sec];
          html += '<h4 class="section-title">' + section.title + '</h4>';
          html += '<ul>';
          for (var i = 0; i < section.items.length; i++) {
            var item = section.items[i];
            var href = item.href;
            if (href.indexOf("http") !== 0) {
              href = year.basePath + href.replace("./", "");
            }
            html += '<li><a href="' + href + '">' + item.label + '</a></li>';
          }
          html += '</ul>';
        }
      }

      document.getElementById("mod-content").innerHTML = html;
    }

    function renderYearCards() {
      var html = "";
      for (var i = 0; i < years.length; i++) {
        var year = years[i];
        var count = countLessons(year);
        var subjectNames = [];
        for (var s = 0; s < year.subjects.length; s++) {
          subjectNames.push(year.subjects[s].name);
        }
        html +=
          '<div class="year-card" onclick="showYear(' + i + ')">' +
          '<div class="year-icon">' + year.name.charAt(0) + 'º</div>' +
          '<div class="year-name">' + year.name + '</div>' +
          '<div class="year-subjects">' + subjectNames.join(" + ") + '</div>' +
          '</div>';
      }
      document.getElementById("year-list").innerHTML = html;
    }

    renderYearCards();

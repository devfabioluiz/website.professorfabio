<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Índice CEAP</title>
  <link href="../estilos/styles.css" rel="stylesheet" />
  <script src="../scripts/script-impressao.js"></script>
  <style>
    #discipline-select {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 70vh;
      padding: 20px;
    }

    #discipline-select h3 {
      font-size: 1.6rem;
      color: #273c75;
      margin-bottom: 40px;
      text-align: center;
    }

    .discipline-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 25px;
      max-width: 900px;
    }

    .discipline-card {
      background: #fff;
      border: 2px solid #2e7d32;
      border-radius: 12px;
      padding: 30px 25px;
      width: 200px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
    }

    .discipline-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 25px rgba(46, 125, 50, 0.2);
      background-color: #e8f5e9;
    }

    .discipline-card .disc-icon {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .discipline-card .disc-name {
      font-size: 1.05rem;
      font-weight: bold;
      color: #1b5e20;
      margin-bottom: 6px;
    }

    .discipline-card .disc-years {
      font-size: 0.82rem;
      color: #666;
    }

    #lesson-view {
      display: none;
      max-width: 750px;
      margin: 30px auto;
      padding: 20px;
    }

    #lesson-view .back-btn {
      display: block;
      background: #273c75;
      color: #fff;
      border: none;
      padding: 10px 24px;
      font-size: 1rem;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 25px;
      transition: background-color 0.2s ease;
    }

    #lesson-view .back-btn:hover {
      background-color: #1b5e20;
    }

    #lesson-view .mod-title {
      color: #273c75;
      border-bottom: 2px solid #2e7d32;
      padding-bottom: 12px;
      margin-bottom: 25px;
      font-size: 1.8rem;
      text-align: center;
    }

    #lesson-view .year-title {
      color: #2e7d32;
      font-size: 1.35rem;
      margin: 30px 0 15px 0;
      border-bottom: 2px solid #2e7d32;
      padding-bottom: 8px;
    }

    #lesson-view .section-title {
      color: #005bb5;
      font-size: 1.15rem;
      margin: 18px 0 8px 0;
    }

    #lesson-view ul {
      list-style: none;
      padding: 0;
    }

    #lesson-view ul li {
      margin: 4px 0;
    }

    #lesson-view ul li a {
      text-decoration: none;
      color: #0073e6;
      font-size: 1rem;
      padding: 6px 12px;
      display: block;
      border-radius: 6px;
      transition: background-color 0.2s ease;
    }

    #lesson-view ul li a:hover {
      background-color: #e0f0ff;
    }

    @media only screen and (max-width: 700px) {
      .discipline-card {
        width: 150px;
        padding: 20px 15px;
      }

      #lesson-view {
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <nav>
    <ul>
      <li><a class="logo" href="../index.html">professorfabio.site</a></li>
    </ul>
  </nav>

  <h2 style="margin: 25px 20px 10px 20px; text-align: center">CEAP</h2>

  <div id="discipline-select">
    <h3>Escolha a disciplina:</h3>
    <div class="discipline-grid" id="discipline-list">
      <a class="logo" href="./indice-filosofia.html" class="discipline-card" style="text-decoration:none;">
        <div class="disc-icon">&#934;</div>
        <div class="disc-name">Filosofia</div>
        <div class="disc-years">1º Ano / 3º Ano</div>
      </a>
      <a class="logo" href="./indice-sociologia.html" class="discipline-card" style="text-decoration:none;">
        <div class="disc-icon">&#128101;</div>
        <div class="disc-name">Sociologia</div>
        <div class="disc-years">2º Ano</div>
      </a>
    </div>
  </div>
</body>
</html>

  <style>
    #discipline-select {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 70vh;
      padding: 20px;
    }

    #discipline-select h3 {
      font-size: 1.6rem;
      color: #273c75;
      margin-bottom: 40px;
      text-align: center;
    }

    .discipline-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 25px;
      max-width: 900px;
    }

    .discipline-card {
      background: #fff;
      border: 2px solid #2e7d32;
      border-radius: 12px;
      padding: 30px 25px;
      width: 200px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
    }

    .discipline-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 25px rgba(46, 125, 50, 0.2);
      background-color: #e8f5e9;
    }

    .discipline-card .disc-icon {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .discipline-card .disc-name {
      font-size: 1.05rem;
      font-weight: bold;
      color: #1b5e20;
      margin-bottom: 6px;
    }

    .discipline-card .disc-years {
      font-size: 0.82rem;
      color: #666;
    }

    #lesson-view {
      display: none;
      max-width: 750px;
      margin: 30px auto;
      padding: 20px;
    }

    #lesson-view .back-btn {
      display: inline-block;
      background: #273c75;
      color: #fff;
      border: none;
      padding: 10px 24px;
      font-size: 1rem;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 25px;
      transition: background-color 0.2s ease;
    }

    #lesson-view .back-btn:hover {
      background-color: #1b5e20;
    }

    #lesson-view .mod-title {
      color: #273c75;
      border-bottom: 2px solid #2e7d32;
      padding-bottom: 12px;
      margin-bottom: 25px;
      font-size: 1.8rem;
      text-align: center;
    }

    #lesson-view .year-title {
      color: #2e7d32;
      font-size: 1.35rem;
      margin: 30px 0 15px 0;
      border-bottom: 2px solid #2e7d32;
      padding-bottom: 8px;
    }

    #lesson-view .section-title {
      color: #005bb5;
      font-size: 1.15rem;
      margin: 18px 0 8px 0;
    }

    #lesson-view ul {
      list-style: none;
      padding: 0;
    }

    #lesson-view ul li {
      margin: 4px 0;
    }

    #lesson-view ul li a {
      text-decoration: none;
      color: #0073e6;
      font-size: 1rem;
      padding: 6px 12px;
      display: block;
      border-radius: 6px;
      transition: background-color 0.2s ease;
    }

    #lesson-view ul li a:hover {
      background-color: #e0f0ff;
    }

    @media only screen and (max-width: 700px) {
      .discipline-card {
        width: 150px;
        padding: 20px 15px;
      }

      #lesson-view {
        padding: 10px;
      }
    }
  </style>
</head>

    function showDisciplines() {
      document.getElementById("discipline-select").style.display = "flex";
      document.getElementById("lesson-view").style.display = "none";
      history.replaceState(null, "", window.location.pathname);
    }

    function showDisciplina(index) {
      var disc = disciplinas[index];
      document.getElementById("discipline-select").style.display = "none";
      document.getElementById("lesson-view").style.display = "block";
      window.location.hash = disc.id;

      document.getElementById("mod-title").innerHTML =
        '<span class="disc-icon" style="font-size:1.8rem;margin-right:8px;">' +
        disc.icon +
        "</span>" +
        disc.name;

      var html = "";

      for (var y = 0; y < disc.years.length; y++) {
        var yr = disc.years[y];
        html += '<h3 class="year-title">' + yr.name + "</h3>";

        for (var sec = 0; sec < yr.sections.length; sec++) {
          var section = yr.sections[sec];
          html += '<h4 class="section-title">' + section.title + "</h4>";
          html += "<ul>";
          for (var i = 0; i < section.items.length; i++) {
            var item = section.items[i];
            var href = item.href;
            if (href.indexOf("http") !== 0) {
              href = yr.basePath + href.replace("./", "");
            }
            html +=
              '<li><a href="' + href + '">' + item.label + "</a></li>";
          }
          html += "</ul>";
        }
      }

      document.getElementById("mod-content").innerHTML = html;
    }

    function renderDisciplineCards() {
      var html = "";
      for (var i = 0; i < disciplinas.length; i++) {
        var disc = disciplinas[i];
        var yearNames = [];
        for (var y = 0; y < disc.years.length; y++) {
          yearNames.push(disc.years[y].name);
        }
        html +=
          '<div class="discipline-card" onclick="showDisciplina(' +
          i +
          ')">' +
          '<div class="disc-icon">' +
          disc.icon +
          "</div>" +
          '<div class="disc-name">' +
          disc.name +
          "</div>" +
          '<div class="disc-years">' +
          yearNames.join(" / ") +
          "</div>" +
          "</div>";
      }
      document.getElementById("discipline-list").innerHTML = html;
    }

    renderDisciplineCards();

    var hash = window.location.hash.replace("#", "");
    if (hash) {
      for (var i = 0; i < disciplinas.length; i++) {
        if (disciplinas[i].id === hash) {
          showDisciplina(i);
          break;
        }
      }
    }

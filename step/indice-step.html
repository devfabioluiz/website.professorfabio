      .back-btn {
        display: block;
        background: #0073e6;
        color: #fff;
        border: none;
        padding: 10px 24px;
        font-size: 1rem;
        border-radius: 8px;
        cursor: pointer;
        transition: background-color 0.2s ease;
      }

      .back-btn:hover {
        background-color: #0073e6;
      }
      #module-select {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 70vh;
        padding: 20px;
      }

      #module-select h3 {
        font-size: 1.6rem;
        color: #273c75;
        margin-bottom: 40px;
        text-align: center;
      }

      .module-grid {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
        max-width: 1000px;
      }

      .module-card {
        background: #fff;
        border: 2px solid #0073e6;
        border-radius: 12px;
        padding: 30px 25px;
        width: 200px;
        text-align: center;
        cursor: pointer;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease,
          background-color 0.2s ease;
      }

      .module-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 8px 25px rgba(0, 115, 230, 0.2);
        background-color: #e8f4ff;
      }

      .module-card .tech-icon {
        font-size: 3rem;
        margin-bottom: 12px;
      }

      .module-card .tech-icon i {
        font-size: 3rem;
      }

      .module-card .tech-icon i.devicon-angular-plain.colored,
      #lesson-view .mod-title i.devicon-angular-plain.colored {
        color: #dd1b16 !important;
      }

      .module-card .tech-name {
        font-size: 1.15rem;
        font-weight: bold;
        color: #005bb5;
        margin-bottom: 6px;
      }

      .module-card .tech-count {
        font-size: 0.85rem;
        color: #777;
      }

      #lesson-view {
        display: none;
        max-width: 700px;
        margin: 30px auto;
        padding: 20px;
      }

      #lesson-view .back-btn {
        display: block;
        background: #0073e6;
        color: #fff;
        border: none;
        padding: 10px 24px;
        font-size: 1rem;
        border-radius: 8px;
        cursor: pointer;
        margin-bottom: 26.25px;
        margin-left: auto;
        margin-right: auto;
        transition: background-color 0.2s ease;
      }

      #lesson-view .back-btn:hover {
        background-color: #0073e6;
      }

      #lesson-view .mod-title {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      #lesson-view .mod-title i {
        font-size: 2.2rem;
      }

      #lesson-view .section-title {
        color: #005bb5;
        font-size: 1.3rem;
        margin: 20px 0 10px 0;
        border-bottom: 1px solid #ddd;
        padding-bottom: 5px;
      }

      #lesson-view ul {
        list-style: none;
        padding: 0;
      }

      #lesson-view ul li {
        margin: 6px 0;
      }

      #lesson-view ul li a {
        text-decoration: none;
        color: #0073e6;
        font-size: 1.05rem;
        padding: 8px 12px;
        display: block;
        border-radius: 6px;
        transition: background-color 0.2s ease;
      }

      #lesson-view ul li a:hover {
        background-color: #e0f0ff;
      }

      @media only screen and (max-width: 700px) {
        .module-card {
          width: 150px;
          padding: 20px 15px;
        }

        #module-select h3 {
          font-size: 1.3rem;
        }
      }
    </style>

      function countLessons(course) {
        var total = 0;
        for (var i = 0; i < course.sections.length; i++) {
          total += course.sections[i].items.length;
        }
        return total;
      }

      function showModules() {
        document.getElementById("module-select").style.display = "flex";
        document.getElementById("lesson-view").style.display = "none";
        history.replaceState(null, "", window.location.pathname);
      }

      function showModule(index) {
        var course = courses[index];
        document.getElementById("module-select").style.display = "none";
        document.getElementById("lesson-view").style.display = "block";
        window.location.hash = course.id;

        document.getElementById("mod-title").innerHTML =
          '<i class="' + course.icon + '"></i> ' + course.name;

        var html = "";

        if (course.plan) {
          html += '<h3 class="section-title">Plano do Curso</h3>';
          html +=
            '<ul><li><a class="logo" href="' +
            course.plan.href +
            '">' +
            course.plan.label +
            "</a></li></ul>";
        }

        for (var s = 0; s < course.sections.length; s++) {
          var section = course.sections[s];
          html += '<h3 class="section-title">' + section.title + "</h3>";
          if (section.plan) {
            html +=
              '<ul><li><a class="logo" href="' +
              section.plan.href +
              '">' +
              section.plan.label +
              "</a></li></ul>";
          }
          html += "<ul>";
          for (var i = 0; i < section.items.length; i++) {
            var item = section.items[i];
            html +=
              '<li><a class="logo" href="' +
              item.href +
              '">' +
              item.label +
              "</a></li>";
          }
          html += "</ul>";
        }

        document.getElementById("mod-content").innerHTML = html;
      }

      function renderModuleCards() {
        var html = "";
        for (var i = 0; i < courses.length; i++) {
          var course = courses[i];
          var count = countLessons(course);
          html +=
            '<div class="module-card" onclick="showModule(' +
            i +
            ')">' +
            '<div class="tech-icon"><i class="' +
            course.icon +
            '"></i></div>' +
            '<div class="tech-name">' +
            course.name +
            "</div>" +
            '<div class="tech-count">' +
            count +
            " aula" +
            (count !== 1 ? "s" : "") +
            "</div>" +
            "</div>";
        }
        document.getElementById("module-list").innerHTML = html;
      }

      renderModuleCards();

      var hash = window.location.hash.replace("#", "");
      if (hash) {
        for (var i = 0; i < courses.length; i++) {
          if (courses[i].id === hash) {
            showModule(i);
            break;
          }
        }
      }
    </script>
  </body>
</html>
